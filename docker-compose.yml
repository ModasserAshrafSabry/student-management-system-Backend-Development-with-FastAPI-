version: "3.9"

services:
  api:
    build: .
    container_name: student_api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  redis:
    image: redis:7
    container_name: redis_container
    ports:
      - "6379:6379"
      